services:
  postgres:
    image: postgres:15
    container_name: social-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend: # ← имя сервиса, куда подключится VS Code
    build:
      context: ./backend # путь к папке с NestJS
      dockerfile: Dockerfile # создадим ниже
    container_name: social-backend
    restart: unless-stopped
    volumes:
      - .:/workspace:cached # hot-reload будет работать
      - /workspace/node_modules # не перезаписываем node_modules
    working_dir: /workspace/backend
    ports:
      - "3000:3000" # порт NestJS
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/social_db?schema=public
      - JWT_SECRET=SECRET
      - JWT_REFRESH_SECRET=SECRET
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
volumes:
  postgres_data:
