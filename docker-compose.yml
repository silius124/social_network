services:
  postgres:
    image: postgres:15
    container_name: social-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: social-backend
    restart: unless-stopped
    volumes:
      - .:/workspace:cached
      - /workspace/backend/node_modules #
    working_dir: /workspace/backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: social-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/workspace/frontend:cached
      - /workspace/frontend/node_modules
    working_dir: /workspace/frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3000
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
